version: '2.3'
services:
  guardduty:
    image: docker.elastic.co/observability/stream:v0.14.0@sha256:a108f4f782df597a4be3c426a3f9c00e58284f682811d45fd13d4686f2260125
    hostname: guardduty.xxxx.amazonaws.com
    ports:
      - 443
    volumes:
      - ./files:/files:ro
    environment:
      PORT: "443"
    command:
      - http-server
      - --addr=:443
      - --config=/files/config.yml
      - --tls-cert=/files/certificate.crt
      - --tls-key=/files/private.key
