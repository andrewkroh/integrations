type: logs
title: Symantec Endpoint Protection logs
release: experimental
streams:
  - input: tcp
    vars:
      - name: syslog_host
        type: text
        title: Syslog Host
        multi: false
        required: true
        show_user: true
        default: localhost
      - name: syslog_port
        type: integer
        title: Syslog Port
        multi: false
        required: true
        show_user: true
        default: 9004
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: true
        default:
          - symantec-endpoint
          - forwarded
    template_path: tcp.yml.hbs
    title: Symantec endpoint logs (tcp)
    description: Collect Symantec endpoint logs using tcp input
  - input: udp
    vars:
      - name: syslog_host
        type: text
        title: Syslog Host
        multi: false
        required: true
        show_user: true
        default: localhost
      - name: syslog_port
        type: integer
        title: Syslog Port
        multi: false
        required: true
        show_user: true
        default: 9004
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: true
        default:
          - symantec-endpoint
          - forwarded
    template_path: udp.yml.hbs
    title: Symantec endpoint logs (udp)
    description: Collect Symantec endpoint logs using udp input
  - input: logfile
    enabled: false
    vars:
      - name: paths
        type: text
        title: Paths
        multi: true
        required: false
        show_user: true
        default:
          - /var/log/symantec-endpoint.log
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: true
        default:
          - symantec-endpoint
          - forwarded
    template_path: log.yml.hbs
    title: Symantec endpoint logs (log)
    description: Collect Symantec endpoint logs using log input
