- name: symantec_endpoint.log
  type: group
  fields:
    - name: signature.id
      type: keyword
    - name: signature.name
      type: keyword
    - name: signature.sub_id
      type: keyword
    - name: intrusion_payload_url
      type: keyword
    - name: _unmapped_csv_columns
      type: keyword

- name: log.syslog.host.name
  type: keyword
- name: log.syslog.process.name
  type: keyword
- name: log.syslog.process.pid
  type: long
