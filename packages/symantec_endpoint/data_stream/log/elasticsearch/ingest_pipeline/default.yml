---
description: Pipeline for parsing Symantec Endpoint logs
processors:
- set:
    copy_from: message
    field: event.original
- set:
    # TODO: See if timestamps can be configured with timezone.
    field: event.timezone
    value: '-05:00'
- set:
    field: observer.vendor
    value: Symantec
- set:
    field: observer.product
    value: Endpoint Protection
- set:
    field: observer.type
    value: edr
- grok:
    field: message
    patterns:
      - '<%{NONNEGINT:log.syslog.facility.code:long}>(?:%{SYSLOGTIMESTAMP:timestamp}|%{TIMESTAMP_ISO8601:timestamp})(?: %{SYSLOGFACILITY})?(?: %{SYSLOGHOST:log.syslog.host.name})?(?: %{SYSLOGPROG}:)? %{GREEDYDATA:message}'
      - '%{SYSLOG5424LINE}'
    pattern_definitions:
      SYSLOGPROG: '%{PROG:log.syslog.process.name}(?:\[%{POSINT:log.syslog.process.pid}\])?'
- date:
    field: timestamp
    target_field: "@timestamp"
    formats:
      - "MMM dd HH:mm:ss"
      - "MMM  d HH:mm:ss"
      - "MMM d HH:mm:ss"
      - ISO8601
    timezone: '{{{event.timezone}}}'
- remove:
    field:
      - timestamp
# https://knowledge.broadcom.com/external/article/155205/external-logging-settings-and-log-event.html
- split:
    field: message
    target_field: csv
    separator: '\s*,\s*'
##- csv:
##    field: message
##    target_fields:
##      - _csv.server # column 0
##      - _csv.event_description
##      - _csv.local_ip # local_host_ip
##      - _csv.local_mac # local_host_mac
##      - _csv.remote_name # remote_host_name
##      - _csv.remote_ip # remote_host_ip
##      - _csv.remote_mac # remote_host_mac
##      - _csv.network_direction # contains Inbound / Outbound
##      - _csv.network_transport # contains UDP / TCP
##      - _csv.intrusion_id
##      - _csv.event_start # begin
##      - _csv.event_end # end_time
##      - _csv.event_count # occurrences
##      - _csv.process_exe # application
##      - _csv.location # location
##      - _csv.user_name
##      - _csv.user_domain #domain_name
##      - _csv.local_port
##      - _csv.remote_port
##      - _csv.signature_id # cids_signature_id
##      - _csv.signature_name # cids_signature_string
##      - _csv.signature_sub_id # cids_signature_subid
##      - _csv.intrusion_url
##      - _csv.intrusion_payload_url
##      - _csv.sha256 # sha-256
##      - _csv.md5 # md-5
- script:
    description: split each csv value
    lang: painless
    source: |
      def out = [:];
      def nonKeyValue = [];
      ctx.csv.forEach(v -> {
          def idx = v.indexOf(": ");
          if (idx != -1 && idx+1 <= v.length()) {
              def k = v.substring(0, idx).toLowerCase().replace(' ', '_').replace('"', '');
              def trimmed = v.substring(v.indexOf(":")+1, v.length()).trim();
              if (!trimmed.isEmpty()) {
                  out[k] = trimmed;
              }
          } else if (v.indexOf(":") == -1) {
            nonKeyValue.add(v);
          }
          return true;
      });
      ctx['csv'] = nonKeyValue;
      ctx['_csv'] = out;
- script:
    if: ctx?.csv != null && !ctx.csv.isEmpty()
    lang: painless
    source: |
      // Assume first key is always the Symantec Endpoint Protection server name.
      ctx['observer']['name'] = ctx.csv.get(0);
      ctx.csv.remove(0);

      def networkTransport = ['ethernet', 'tcp', 'udp', 'icmp'];
      def networkDirection = ['inbound', 'outbound'];
      def unmapped = [];
      ctx.csv.forEach(unmappedColumn -> {
        if (networkTransport.contains(unmappedColumn.toLowerCase())) {
          def network = ctx['network'];
          if (network == null) {
            ctx['network'] = [:];
          }
          ctx['network']['transport'] = unmappedColumn.toLowerCase();
          return true;
        }
        if (networkDirection.contains(unmappedColumn.toLowerCase())) {
          def network = ctx['network'];
          if (network == null) {
            ctx['network'] = [:];
          }
          ctx['network']['direction'] = unmappedColumn.toLowerCase();
          return true;
        }

        unmapped.add(unmappedColumn);
        return true;
      });

      if (!unmapped.isEmpty()) {
        ctx['csv'] = unmapped;
      } else {
        ctx.remove('csv');
      }

# TODO: Format MAC addresses.

- set:
    field: event.code
    value: '{{{_csv.cids_signature_id}}}'
    ignore_empty_value: true
- remove:
    field: message
    ignore_missing: true
- rename:
    field: _csv.event_description
    target_field: message
    ignore_missing: true
- rename:
    if: ctx?._csv?.local_host_ip != "0.0.0.0"
    field: _csv.local_host_ip
    target_field: source.ip
    ignore_missing: true
- rename:
    if: ctx?._csv?.local_host_mac != "000000000000"
    field: _csv.local_host_mac
    target_field: source.mac
    ignore_missing: true
- append:
    if: ctx?.source?.ip != null
    field: host.ip
    value: '{{{source.ip}}}'
    allow_duplicates: false
- append:
    if: ctx?.source?.mac != null
    field: host.mac
    value: '{{{source.mac}}}'
    allow_duplicates: false
- rename:
    if: ctx?._csv?.remote_host_name != ""
    field: _csv.remote_host_name
    target_field: destination.domain
    ignore_missing: true
- rename:
    if: ctx?._csv?.remote_host_ip != "0.0.0.0"
    field: _csv.remote_host_ip
    target_field: destination.ip
    ignore_missing: true
- rename:
    if: ctx?._csv?.remote_host_mac != "000000000000"
    field: _csv.remote_host_mac
    target_field: destination.mac
    ignore_missing: true
- set:
    if: ctx?.network?.direction == "inbound"
    field: network.direction
    value: ingress
- set:
    if: ctx?.network?.direction == "outbound"
    field: network.direction
    value: egress
- rename:
    field: _csv.network_transport
    target_field: network.transport
    ignore_missing: true
- lowercase:
    field: network.transport
    ignore_missing: true
- rename:
    field: _csv.intrusion_id
    target_field: rule.id
    ignore_missing: true
- date:
    field: _csv.begin
    target_field: event.start
    ignore_failure: true
    formats:
      - yyyy-MM-dd HH:mm:ss
    timezone: '{{{event.timezone}}}'
- date:
    field: _csv.end_time
    target_field: event.end
    ignore_failure: true
    formats:
      - yyyy-MM-dd HH:mm:ss
    timezone: '{{{event.timezone}}}'
- convert:
    field: _csv.occurrences
    target_field: event.count
    type: long
    ignore_failure: true
- rename:
    field: _csv.application
    target_field: process.executable
    ignore_missing: true
- rename:
    field: _csv.location
    target_field: source.geo.name
    ignore_missing: true
- rename:
    field: _csv.user_name
    target_field: user.name
    ignore_missing: true
- rename:
    field: _csv.domain_name
    target_field: user.domain
    ignore_missing: true
- convert:
    if: ctx?._csv?.local_port != "0"
    field: _csv.local_port
    target_field: source.port
    type: long
    ignore_failure: true
- convert:
    if: ctx?._csv?.remote_port != "0"
    field: _csv.remote_port
    target_field: destination.port
    type: long
    ignore_failure: true
- rename:
    field: _csv.cids_signature_id
    target_field: symantec_endpoint.log.signature.id
    ignore_missing: true
- rename:
    field: _csv.cids_signature_string
    target_field: symantec_endpoint.log.signature.name
    ignore_missing: true
- rename:
    field: _csv.cids_signature_subid
    target_field: symantec_endpoint.log.signature.sub_id
    ignore_missing: true
- rename:
    field: _csv.intrusion_url
    target_field: url.original
    ignore_missing: true
- rename:
    field: _csv.intrusion_payload_url
    target_field: symantec_endpoint.log.intrusion_payload_url
    ignore_missing: true
- rename:
    field: _csv.sha-256
    target_field: process.hash.sha256
    ignore_missing: true
- lowercase:
    field: process.hash.sha256
    ignore_missing: true
- rename:
    field: _csv.md-5
    target_field: process.hash.md5
    ignore_missing: true
- lowercase:
    field: process.hash.md5
    ignore_missing: true
- rename:
    field: _csv.action
    target_field: event.action
    ignore_missing: true
- rename:
    field: _csv.rule
    target_field: rule.name
    ignore_missing: true
- remove:
    ignore_missing: true
    field:
      - _csv.event_description
      - _csv.local_host_ip
      - _csv.local_host_mac
      - _csv.remote_host_name
      - _csv.remote_host_ip
      - _csv.remote_host_mac
      - _csv.intrusion_id
      - _csv.begin
      - _csv.end_time
      - _csv.occurrences
      - _csv.application
      - _csv.location
      - _csv.user_name
      - _csv.domain_name
      - _csv.local_port
      - _csv.remote_port
      - _csv.cids_signature_id
      - _csv.cids_signature_string
      - _csv.cids_signature_subid
      - _csv.intrusion_url
      - _csv.intrusion_payload_url
      - _csv.sha-256
      - _csv.md-5
      - _csv.rule
      - _csv.action
- remove:
    if: ctx?._csv != null && ctx?._csv.isEmpty()
    field: _csv
    ignore_missing: true
- rename:
    field: csv
    target_field: symantec_endpoint.log._unmapped_csv_columns
    ignore_missing: true
- script:
    # Local was assumed to be source and remote was assumed to be destination.
    # But if direction is ingress then swap the two around.
    if: ctx?.network?.direction == "ingress" && ctx?.source != null && ctx?.destination != null
    lang: painless
    source: |
      def tmp = ctx.source;
      ctx.source = ctx.destination;
      ctx.destination = tmp;

