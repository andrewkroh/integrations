---
description: Pipeline for parsing Symantec Endpoint logs
processors:
- set:
    copy_from: message
    field: event.original
- set:
    # TODO: See if timestamps can be configured with timezone.
    field: event.timezone
    value: '-05:00'
- set:
    field: observer.vendor
    value: Symantec
- set:
    field: observer.product
    value: Endpoint Protection
- set:
    field: observer.type
    value: edr

# TODO: Handle non-syslog logs.
- grok:
    field: message
    patterns:
      - '<%{NONNEGINT:log.syslog.facility.code:long}>(?:%{SYSLOGTIMESTAMP:timestamp}|%{TIMESTAMP_ISO8601:timestamp})(?: %{SYSLOGFACILITY})?(?: %{SYSLOGHOST:log.syslog.host.name})?(?: %{SYSLOGPROG}:)? %{GREEDYDATA:message}'
      - '%{SYSLOG5424LINE}'
    pattern_definitions:
      SYSLOGPROG: '%{PROG:log.syslog.process.name}(?:\[%{POSINT:log.syslog.process.pid}\])?'
- date:
    field: timestamp
    target_field: "@timestamp"
    formats:
      - "MMM dd HH:mm:ss"
      - "MMM  d HH:mm:ss"
      - "MMM d HH:mm:ss"
      - ISO8601
    timezone: '{{{event.timezone}}}'
- remove:
    field:
      - timestamp

###
# 1. Parse the CSV into an array of column values.
# 2. Parse labels from each column if the value takes the form of 'Label Name: Some Value' or 'Label Name:'.
# 3. Fingerprint the message based by joining the labels separated by '|'. Use 'NONE' for columns without an embedded label.
# 4. Set 'event.provider' based on the message fingerprint. The different log types are listed in https://knowledge.broadcom.com/external/article?legacyId=tech171741#Administrative.
# 5. Handle columns without an embedded label. Based on the fingerprint, map unlabeled columns to a key.
- csv:
    field: message
    target_fields:
      - '_csv_array.00'
      - '_csv_array.01'
      - '_csv_array.02'
      - '_csv_array.03'
      - '_csv_array.04'
      - '_csv_array.05'
      - '_csv_array.06'
      - '_csv_array.07'
      - '_csv_array.08'
      - '_csv_array.09'
      - '_csv_array.10'
      - '_csv_array.11'
      - '_csv_array.12'
      - '_csv_array.13'
      - '_csv_array.14'
      - '_csv_array.15'
      - '_csv_array.16'
      - '_csv_array.17'
      - '_csv_array.18'
      - '_csv_array.19'
      - '_csv_array.20'
      - '_csv_array.21'
      - '_csv_array.22'
      - '_csv_array.23'
      - '_csv_array.24'
      - '_csv_array.25'
      - '_csv_array.26'
      - '_csv_array.27'
      - '_csv_array.28'
      - '_csv_array.29'
      - '_csv_array.30'
      - '_csv_array.31'
      - '_csv_array.32'
      - '_csv_array.33'
      - '_csv_array.34'
      - '_csv_array.35'
      - '_csv_array.36'
      - '_csv_array.37'
      - '_csv_array.38'
      - '_csv_array.39'
      - '_csv_array.40'
      - '_csv_array.41'
      - '_csv_array.42'
      - '_csv_array.43'
      - '_csv_array.44'
      - '_csv_array.45'
      - '_csv_array.46'
      - '_csv_array.47'
      - '_csv_array.48'
      - '_csv_array.49'
      - '_csv_array.50'
- script:
    description: Create array from CSV values.
    tag: csv-map-to-array
    lang: painless
    source: |
      def columnArray = [];
      def sortedMap = new TreeMap();
      sortedMap.putAll(ctx._csv_array);
      sortedMap.forEach((k, v) -> {
        columnArray.add(v);
      });
      ctx['_csv_array'] = columnArray;

- script:
    description: Split colon separated key/values.
    tag: split-colon-separated-key-value
    lang: painless
    source: |
      def keyValue = [:];
      def fingerprint = [];
      ctx._csv_array.forEach(v -> {
          def idx = v.indexOf(": ");
          if (idx != -1 && idx+1 <= v.length()) {
              def k = v.substring(0, idx).toLowerCase().replace(' ', '_').replace('"', '');
              def trimmed = v.substring(v.indexOf(":")+1, v.length()).trim();
              if (!trimmed.isEmpty()) {
                  keyValue[k] = trimmed;
                  fingerprint.add(k);
              }
          } else if (v.endsWith(':')) {
            fingerprint.add(v.substring(0, v.length() - 1).toLowerCase().replace(' ', '_'));
          } else {
            fingerprint.add("NONE");
          }
          return true;
      });
      if (!keyValue.isEmpty()) {
        ctx['_csv_map'] = keyValue;
      }
      ctx['_fingerprint'] = String.join("|", fingerprint);

- script:
    lang: painless
    params:
      providers:
      - name: 'Agent Behavior Log'
        fingerprint: NONE|NONE|NONE|NONE|NONE|begin|end_time|rule|NONE|NONE|NONE|NONE|NONE|user_name|domain_name|file_size_(bytes)|device_id
        columns:
          - index: 2
            name: action
          - index: 3
            name: event_description
          - index: 4
            name: api_name
          - index: 8
            name: caller_process_id
          - index: 9
            name: caller_process_name
          - index: 10
            name: caller_return_address
          - index: 11
            name: caller_return_module_name
          - index: 12
            name: parameters # name of the module, process, registry location or file
      - name: 'Agent Security Log'
        fingerprint: NONE|event_description|local|local_host_mac|remote_host_ip|remote_host_mac|NONE|NONE|begin|end|occurrences|location|user|domain|local_port|remote_port|cids_signature_id|cids_signature_subid|md-5
        columns:
          - index: 7
            name: traffic_direction
          - index: 8
            name: network_protocol
      - name: 'Agent Traffic Log'
        fingerprint: NONE|local_host_ip|local_port|local_host_mac|remote_host_ip|remote_port|remote_host_mac|NONE|NONE|begin|end_time|occurrences|application|rule|location|user_name|domain_name|action|sha-256|md-5
        columns:
          - index: 9
            name: traffic_direction
          - index: 8
            name: network_protocol
      - name: 'Agent Activity Log'
        fingerprint: site|server_name|domain_name|NONE|NONE|NONE|NONE
        columns:
          - index: 3
            name: event_description
          - index: 4
            name: local_host_name
          - index: 5
            name: user_name
          - index: 6
            name: domain_name
    source: |
      // Assume first column is always the host.name.
      if (ctx?.host == null) {
        ctx['host'] = [:];
      }
      ctx['host']['hostname'] = ctx._csv_array.get(0);

      params.providers.forEach(provider -> {
        if (provider.fingerprint == ctx._fingerprint) {
          ctx['event']['provider'] = provider.name;
          provider.columns.forEach(c -> {
            ctx._csv_map[c.name] = ctx._csv_array.get(c.index);
          });
        }
        return true;
      });

# TODO: Format MAC addresses.

- remove:
    field: message
    ignore_missing: true
- rename:
    field: _csv_map.event_description
    target_field: message
    ignore_missing: true
- rename:
    if: ctx?._csv_map?.local_host_ip == null
    field: _csv_map.local
    target_field: _csv_map.local_host_ip
    ignore_missing: true
- convert:
    if: ctx?._csv_map?.local_host_ip != "0.0.0.0"
    field: _csv_map.local_host_ip
    target_field: source.ip
    type: ip
    ignore_missing: true
- rename:
    if: ctx?._csv_map?.local_host_mac != "000000000000"
    field: _csv_map.local_host_mac
    target_field: source.mac
    ignore_missing: true
- append:
    if: ctx?.source?.ip != null
    field: host.ip
    value: '{{{source.ip}}}'
    allow_duplicates: false
- append:
    if: ctx?.source?.mac != null
    field: host.mac
    value: '{{{source.mac}}}'
    allow_duplicates: false
- rename:
    if: ctx?._csv_map?.remote_host_name != ""
    field: _csv_map.remote_host_name
    target_field: destination.domain
    ignore_missing: true
- rename:
    if: ctx?._csv_map?.remote_host_ip != "0.0.0.0"
    field: _csv_map.remote_host_ip
    target_field: destination.ip
    ignore_missing: true
- rename:
    if: ctx?._csv_map?.remote_host_mac != "000000000000"
    field: _csv_map.remote_host_mac
    target_field: destination.mac
    ignore_missing: true
- lowercase:
    field: _csv_map.traffic_direction
    ignore_missing: true
- rename:
    field: _csv_map.traffic_direction
    target_field: network.direction
    ignore_missing: true
- set:
    if: ctx?.network?.direction == "inbound"
    field: network.direction
    value: ingress
- set:
    if: ctx?.network?.direction == "outbound"
    field: network.direction
    value: egress
- lowercase:
    field: _csv_map.network_protocol
    ignore_missing: true
- rename:
    field: _csv_map.network_protocol
    target_field: network.transport
    ignore_missing: true
- rename:
    field: _csv_map.network_protocol
    target_field: network.transport
    ignore_missing: true
- lowercase:
    field: network.transport
    ignore_missing: true
- rename:
    field: _csv_map.intrusion_id
    target_field: rule.id
    ignore_missing: true
- date:
    field: _csv_map.begin
    target_field: event.start
    ignore_failure: true
    formats:
      - yyyy-MM-dd HH:mm:ss
    timezone: '{{{event.timezone}}}'
- rename:
    if: ctx?._csv_map?.end_time == null
    field: _csv_map.end
    target_field: _csv_map.end_time
    ignore_missing: true
- date:
    field: _csv_map.end_time
    target_field: event.end
    ignore_failure: true
    formats:
      - yyyy-MM-dd HH:mm:ss
    timezone: '{{{event.timezone}}}'
- convert:
    field: _csv_map.occurrences
    target_field: event.count
    type: long
    ignore_failure: true
- rename:
    field: _csv_map.application
    target_field: process.executable
    ignore_missing: true
- rename:
    field: _csv_map.location
    target_field: source.geo.name
    ignore_missing: true
- rename:
    field: _csv_map.user_name
    target_field: user.name
    ignore_missing: true
- rename:
    field: _csv_map.user
    target_field: user.name
    ignore_missing: true
- rename:
    field: _csv_map.domain_name
    target_field: user.domain
    ignore_missing: true
- rename:
    field: _csv_map.domain
    target_field: user.domain
    ignore_missing: true
- convert:
    if: ctx?._csv_map?.local_port != "0"
    field: _csv_map.local_port
    target_field: source.port
    type: long
    ignore_failure: true
- convert:
    if: ctx?._csv_map?.remote_port != "0"
    field: _csv_map.remote_port
    target_field: destination.port
    type: long
    ignore_failure: true
- rename:
    field: _csv_map.cids_signature_id
    target_field: symantec_endpoint.log.signature.id
    ignore_missing: true
- rename:
    field: _csv_map.cids_signature_string
    target_field: symantec_endpoint.log.signature.name
    ignore_missing: true
- rename:
    field: _csv_map.cids_signature_subid
    target_field: symantec_endpoint.log.signature.sub_id
    ignore_missing: true
- rename:
    field: _csv_map.intrusion_url
    target_field: url.original
    ignore_missing: true
- rename:
    field: _csv_map.intrusion_payload_url
    target_field: symantec_endpoint.log.intrusion_payload_url
    ignore_missing: true
- rename:
    field: _csv_map.sha-256
    target_field: process.hash.sha256
    ignore_missing: true
- lowercase:
    field: process.hash.sha256
    ignore_missing: true
- rename:
    field: _csv_map.md-5
    target_field: process.hash.md5
    ignore_missing: true
- lowercase:
    field: process.hash.md5
    ignore_missing: true
- rename:
    field: _csv_map.action
    target_field: event.action
    ignore_missing: true
- lowercase:
    field: event.action
    ignore_missing: true
- rename:
    field: _csv_map.rule
    target_field: rule.name
    ignore_missing: true
- convert:
    field: _csv_map.file_size_(bytes)
    target_field: file.size
    type: long
    ignore_missing: true
    ignore_failure: true
- rename:
    field: _csv_map.caller_process_name
    target_field: process.executable
    ignore_missing: true
- convert:
    field: _csv_map.caller_process_id
    target_field: process.pid
    type: long
    ignore_missing: true
- script:
    # Local was assumed to be source and remote was assumed to be destination.
    # But if direction is ingress then swap the two around.
    description: Swap source/destination for "ingress".
    tag: swap-source-destination-on-ingress
    if: ctx?.network?.direction == "ingress" && ctx?.source != null && ctx?.destination != null
    lang: painless
    source: |
      def tmp = ctx.source;
      ctx.source = ctx.destination;
      ctx.destination = tmp;

- script:
    description: Apply ECS categorization.
    tag: ecs-categorization
    lang: painless
    ignore_failure: true
    source: |
      ctx.event.kind = 'event';
      ctx.event.category = ['intrusion_detection'];
      if (ctx?.event?.action != null && ctx.event.action == 'blocked') {
          ctx.event.type = ['denied'];
      } else if (ctx?.event?.action != null && ctx.event.action == 'not blocked') {
          ctx.event.type = ['allowed'];
      } else if (ctx.message.contains('not blocked')) {
          ctx.event.type = ['allowed'];
          ctx.event.action = 'not blocked';
      } else if (!ctx.message.contains('not blocked') && ctx.message.contains('blocked')) {
          ctx.event.type = ['denied'];
          ctx.event.action = 'blocked';
      } else {
          ctx.event.type = ['info'];
      }

- remove:
    ignore_missing: true
    field:
      - _csv_map.action
      - _csv_map.application
      - _csv_map.begin
      - _csv_map.cids_signature_id
      - _csv_map.cids_signature_string
      - _csv_map.cids_signature_subid
      - _csv_map.domain_name
      - _csv_map.end
      - _csv_map.end_time
      - _csv_map.event_description
      - _csv_map.file_size_(bytes)
      - _csv_map.intrusion_id
      - _csv_map.intrusion_payload_url
      - _csv_map.intrusion_url
      - _csv_map.local
      - _csv_map.local_host_ip
      - _csv_map.local_host_mac
      - _csv_map.local_port
      - _csv_map.location
      - _csv_map.md-5
      - _csv_map.occurrences
      - _csv_map.remote_host_ip
      - _csv_map.remote_host_mac
      - _csv_map.remote_host_name
      - _csv_map.remote_port
      - _csv_map.rule
      - _csv_map.sha-256
      - _csv_map.user_name
      - _csv_map.caller_process_id
      - _csv_map.caller_process_name
      - _csv_map.network_protocol
      - _csv_map.traffic_direction

- script:
    description: Merge unmapped key/values into symantec_endpoint.log.
    tag: merge-unmapped-keys
    lang: painless
    source: |
      if (ctx?._csv_map != null && !ctx?._csv_map.isEmpty()) {
        def sep = ctx['symantec_endpoint'];
        if (sep == null) {
          sep = [:];
          ctx['symantec_endpoint'] = sep;
        }
        def log = sep['log'];
        if (log == null) {
          log = [:];
          sep['log'] = log;
        }
        ctx._csv_map.forEach((k, v) -> {
          log[k] = v;
        });
      }

      ctx.remove('_csv_map');

# Related IP
- append:
    if: ctx?.source?.ip != null
    field: related.ip
    value: '{{{source.ip}}}'
    allow_duplicates: false
- append:
    if: ctx?.destination?.ip != null
    field: related.ip
    value: '{{{destination.ip}}}'
    allow_duplicates: false

# Related Hash
- append:
    if: ctx?.process?.hash?.md5 != null
    field: related.hash
    value: '{{{process.hash.md5}}}'
    allow_duplicates: true
- append:
    if: ctx?.process?.hash?.sha256 != null
    field: related.hash
    value: '{{{process.hash.sha256}}}'
    allow_duplicates: true

# IP Geolocation Lookup
- geoip:
    if: ctx.source?.geo == null
    field: source.ip
    target_field: source.geo
    ignore_missing: true
- geoip:
    if: ctx.destination?.geo == null
    field: destination.ip
    target_field: destination.geo
    ignore_missing: true

# IP Autonomous System (AS) Lookup
- geoip:
    database_file: GeoLite2-ASN.mmdb
    field: source.ip
    target_field: source.as
    properties:
      - asn
      - organization_name
    ignore_missing: true
- geoip:
    database_file: GeoLite2-ASN.mmdb
    field: destination.ip
    target_field: destination.as
    properties:
      - asn
      - organization_name
    ignore_missing: true
- rename:
    field: source.as.asn
    target_field: source.as.number
    ignore_missing: true
- rename:
    field: source.as.organization_name
    target_field: source.as.organization.name
    ignore_missing: true
- rename:
    field: destination.as.asn
    target_field: destination.as.number
    ignore_missing: true
- rename:
    field: destination.as.organization_name
    target_field: destination.as.organization.name
    ignore_missing: true

#- remove:
#    ignore_missing: true
#    field:
#      - _csv_array
#      - _csv_map
#      - _fingerprint
on_failure:
- set:
    field: error.message
    value: '{{ _ingest.on_failure_message }}'
- remove:
    ignore_missing: true
    field:
      - _csv_array
      - _csv_map
      - _fingerprint
