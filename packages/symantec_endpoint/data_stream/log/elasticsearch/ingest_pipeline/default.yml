---
description: Pipeline for parsing Symantec Endpoint logs
processors:
- set:
    copy_from: message
    field: event.original
- set:
    # TODO: See if timestamps can be configured with timezone.
    field: event.timezone
    value: '-05:00'
- set:
    field: observer.vendor
    value: Symantec
- set:
    field: observer.product
    value: Endpoint Protection
- set:
    field: observer.type
    value: edr

# TODO: Handle non-syslog logs.
- grok:
    field: message
    patterns:
      - '<%{NONNEGINT:log.syslog.facility.code:long}>(?:%{SYSLOGTIMESTAMP:timestamp}|%{TIMESTAMP_ISO8601:timestamp})(?: %{SYSLOGFACILITY})?(?: %{SYSLOGHOST:log.syslog.host.name})?(?: %{SYSLOGPROG}:)? %{GREEDYDATA:message}'
      - '%{SYSLOG5424LINE}'
    pattern_definitions:
      SYSLOGPROG: '%{PROG:log.syslog.process.name}(?:\[%{POSINT:log.syslog.process.pid}\])?'
- date:
    field: timestamp
    target_field: "@timestamp"
    formats:
      - "MMM dd HH:mm:ss"
      - "MMM  d HH:mm:ss"
      - "MMM d HH:mm:ss"
      - ISO8601
    timezone: '{{{event.timezone}}}'
- remove:
    field:
      - timestamp

- csv:
