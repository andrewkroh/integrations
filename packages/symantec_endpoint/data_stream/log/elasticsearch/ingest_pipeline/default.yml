- script:
    description: Create array from CSV values.
    tag: csv-map-to-array
    lang: painless
    source: |
      def columnArray = [];
      def sortedMap = new TreeMap();
      sortedMap.putAll(ctx._unmapped_csv);
      sortedMap.forEach((k, v) -> {
        columnArray.add(v);
      });
      ctx['_unmapped_csv'] = columnArray;

- script:
    description: Split colon separated key/values.
    tag: split-colon-separated-key-value
    lang: painless
    source: |
      def keyValue = [:];
      def nonKeyValue = [];
      ctx._unmapped_csv.forEach(v -> {
          def idx = v.indexOf(": ");
          if (idx != -1 && idx+1 <= v.length()) {
              def k = v.substring(0, idx).toLowerCase().replace(' ', '_').replace('"', '');
              def trimmed = v.substring(v.indexOf(":")+1, v.length()).trim();
              if (!trimmed.isEmpty()) {
                  keyValue[k] = trimmed;
              }
          } else if (!v.endsWith(":")) {
            nonKeyValue.add(v);
          }
          return true;
      });
      if (!keyValue.isEmpty()) {
        ctx['_csv'] = keyValue;
      }
      if (!nonKeyValue.isEmpty()) {
        ctx['_unmapped_csv'] = nonKeyValue;
      }

- script:
    description: Assign unmapped columns.
    if: ctx?._unmapped_csv != null
    lang: painless
    source: |
      // Assume first column is always the Symantec Endpoint Protection server name.
      if (ctx?.host == null) {
        ctx['host'] = [:];
      }
      ctx['host']['hostname'] = ctx._unmapped_csv.get(0);
      ctx._unmapped_csv.remove(0);

      def networkTransport = ['ethernet', 'tcp', 'udp', 'icmp'];
      def networkDirection = ['inbound', 'outbound'];
      def filteredUnmappedCsv = [];

      ctx._unmapped_csv.forEach(unmappedColumn -> {
        if (networkTransport.contains(unmappedColumn.toLowerCase())) {
          def network = ctx['network'];
          if (network == null) {
            ctx['network'] = [:];
          }
          ctx['network']['transport'] = unmappedColumn.toLowerCase();
          return true;
        }
        if (networkDirection.contains(unmappedColumn.toLowerCase())) {
          def network = ctx['network'];
          if (network == null) {
            ctx['network'] = [:];
          }
          ctx['network']['direction'] = unmappedColumn.toLowerCase();
          return true;
        }

        filteredUnmappedCsv.add(unmappedColumn);
        return true;
      });

      if (!filteredUnmappedCsv.isEmpty()) {
        ctx['_unmapped_csv'] = filteredUnmappedCsv;
      } else {
        ctx.remove('_unmapped_csv');
      }

- rename:
    field: _unmapped_csv
    target_field: symantec_endpoint.log._unmapped_csv
    ignore_missing: true

# TODO: Format MAC addresses.

- remove:
    field: message
    ignore_missing: true
- rename:
    field: _csv.event_description
    target_field: message
    ignore_missing: true
- rename:
    if: ctx?._csv?.local_host_ip == null
    field: _csv.local
    target_field: _csv.local_host_ip
    ignore_missing: true
- convert:
    if: ctx?._csv?.local_host_ip != "0.0.0.0"
    field: _csv.local_host_ip
    target_field: source.ip
    type: ip
    ignore_missing: true
- rename:
    if: ctx?._csv?.local_host_mac != "000000000000"
    field: _csv.local_host_mac
    target_field: source.mac
    ignore_missing: true
- append:
    if: ctx?.source?.ip != null
    field: host.ip
    value: '{{{source.ip}}}'
    allow_duplicates: false
- append:
    if: ctx?.source?.mac != null
    field: host.mac
    value: '{{{source.mac}}}'
    allow_duplicates: false
- rename:
    if: ctx?._csv?.remote_host_name != ""
    field: _csv.remote_host_name
    target_field: destination.domain
    ignore_missing: true
- rename:
    if: ctx?._csv?.remote_host_ip != "0.0.0.0"
    field: _csv.remote_host_ip
    target_field: destination.ip
    ignore_missing: true
- rename:
    if: ctx?._csv?.remote_host_mac != "000000000000"
    field: _csv.remote_host_mac
    target_field: destination.mac
    ignore_missing: true
- set:
    if: ctx?.network?.direction == "inbound"
    field: network.direction
    value: ingress
- set:
    if: ctx?.network?.direction == "outbound"
    field: network.direction
    value: egress
- rename:
    field: _csv.network_transport
    target_field: network.transport
    ignore_missing: true
- lowercase:
    field: network.transport
    ignore_missing: true
- rename:
    field: _csv.intrusion_id
    target_field: rule.id
    ignore_missing: true
- date:
    field: _csv.begin
    target_field: event.start
    ignore_failure: true
    formats:
      - yyyy-MM-dd HH:mm:ss
    timezone: '{{{event.timezone}}}'
- rename:
    if: ctx?._csv?.end_time == null
    field: _csv.end
    target_field: _csv.end_time
    ignore_missing: true
- date:
    field: _csv.end_time
    target_field: event.end
    ignore_failure: true
    formats:
      - yyyy-MM-dd HH:mm:ss
    timezone: '{{{event.timezone}}}'
- convert:
    field: _csv.occurrences
    target_field: event.count
    type: long
    ignore_failure: true
- rename:
    field: _csv.application
    target_field: process.executable
    ignore_missing: true
- rename:
    field: _csv.location
    target_field: source.geo.name
    ignore_missing: true
- rename:
    field: _csv.user_name
    target_field: user.name
    ignore_missing: true
- rename:
    field: _csv.user
    target_field: user.name
    ignore_missing: true
- rename:
    field: _csv.domain_name
    target_field: user.domain
    ignore_missing: true
- rename:
    field: _csv.domain
    target_field: user.domain
    ignore_missing: true
- convert:
    if: ctx?._csv?.local_port != "0"
    field: _csv.local_port
    target_field: source.port
    type: long
    ignore_failure: true
- convert:
    if: ctx?._csv?.remote_port != "0"
    field: _csv.remote_port
    target_field: destination.port
    type: long
    ignore_failure: true
- rename:
    field: _csv.cids_signature_id
    target_field: symantec_endpoint.log.signature.id
    ignore_missing: true
- rename:
    field: _csv.cids_signature_string
    target_field: symantec_endpoint.log.signature.name
    ignore_missing: true
- rename:
    field: _csv.cids_signature_subid
    target_field: symantec_endpoint.log.signature.sub_id
    ignore_missing: true
- rename:
    field: _csv.intrusion_url
    target_field: url.original
    ignore_missing: true
- rename:
    field: _csv.intrusion_payload_url
    target_field: symantec_endpoint.log.intrusion_payload_url
    ignore_missing: true
- rename:
    field: _csv.sha-256
    target_field: process.hash.sha256
    ignore_missing: true
- lowercase:
    field: process.hash.sha256
    ignore_missing: true
- rename:
    field: _csv.md-5
    target_field: process.hash.md5
    ignore_missing: true
- lowercase:
    field: process.hash.md5
    ignore_missing: true
- rename:
    field: _csv.action
    target_field: event.action
    ignore_missing: true
- lowercase:
    field: event.action
    ignore_missing: true
- rename:
    field: _csv.rule
    target_field: rule.name
    ignore_missing: true

- script:
    # Local was assumed to be source and remote was assumed to be destination.
    # But if direction is ingress then swap the two around.
    description: Swap source/destination for "ingress".
    tag: swap-source-destination-on-ingress
    if: ctx?.network?.direction == "ingress" && ctx?.source != null && ctx?.destination != null
    lang: painless
    source: |
      def tmp = ctx.source;
      ctx.source = ctx.destination;
      ctx.destination = tmp;

- script:
    description: Apply ECS categorization.
    tag: ecs-categorization
    lang: painless
    ignore_failure: true
    source: |
      ctx.event.kind = 'event';
      ctx.event.category = ['intrusion_detection'];
      if (ctx?.event?.action != null && ctx.event.action == 'blocked') {
          ctx.event.type = ['denied'];
      } else if (ctx?.event?.action != null && ctx.event.action == 'not blocked') {
          ctx.event.type = ['allowed'];
      } else if (ctx.message.contains('not blocked')) {
          ctx.event.type = ['allowed'];
          ctx.event.action = 'not blocked';
      } else if (!ctx.message.contains('not blocked') && ctx.message.contains('blocked')) {
          ctx.event.type = ['denied'];
          ctx.event.action = 'blocked';
      } else {
          ctx.event.type = ['info'];
      }

- remove:
    ignore_missing: true
    field:
      - _csv.event_description
      - _csv.local
      - _csv.local_host_ip
      - _csv.local_host_mac
      - _csv.remote_host_name
      - _csv.remote_host_ip
      - _csv.remote_host_mac
      - _csv.intrusion_id
      - _csv.begin
      - _csv.end
      - _csv.end_time
      - _csv.occurrences
      - _csv.application
      - _csv.location
      - _csv.user_name
      - _csv.domain_name
      - _csv.local_port
      - _csv.remote_port
      - _csv.cids_signature_id
      - _csv.cids_signature_string
      - _csv.cids_signature_subid
      - _csv.intrusion_url
      - _csv.intrusion_payload_url
      - _csv.sha-256
      - _csv.md-5
      - _csv.rule
      - _csv.action

- script:
    description: Merge unmapped key/values into symantec_endpoint.log.
    tag: merge-unmapped-keys
    lang: painless
    source: |
      if (ctx?._csv != null && !ctx?._csv.isEmpty()) {
        def sep = ctx['symantec_endpoint'];
        if (sep == null) {
          sep = [:];
          ctx['symantec_endpoint'] = sep;
        }
        def log = sep['log'];
        if (log == null) {
          log = [:];
          sep['log'] = log;
        }
        ctx._csv.forEach((k, v) -> {
          log[k] = v;
        });
      }

      ctx.remove('_csv');

# Related IP
- append:
    if: ctx?.source?.ip != null
    field: related.ip
    value: '{{{source.ip}}}'
    allow_duplicates: false
- append:
    if: ctx?.destination?.ip != null
    field: related.ip
    value: '{{{destination.ip}}}'
    allow_duplicates: false

# Related Hash
- append:
    if: ctx?.process?.hash?.md5 != null
    field: related.hash
    value: '{{{process.hash.md5}}}'
    allow_duplicates: true
- append:
    if: ctx?.process?.hash?.sha256 != null
    field: related.hash
    value: '{{{process.hash.sha256}}}'
    allow_duplicates: true

# IP Geolocation Lookup
- geoip:
    if: ctx.source?.geo == null
    field: source.ip
    target_field: source.geo
    ignore_missing: true
- geoip:
    if: ctx.destination?.geo == null
    field: destination.ip
    target_field: destination.geo
    ignore_missing: true

# IP Autonomous System (AS) Lookup
- geoip:
    database_file: GeoLite2-ASN.mmdb
    field: source.ip
    target_field: source.as
    properties:
      - asn
      - organization_name
    ignore_missing: true
- geoip:
    database_file: GeoLite2-ASN.mmdb
    field: destination.ip
    target_field: destination.as
    properties:
      - asn
      - organization_name
    ignore_missing: true
- rename:
    field: source.as.asn
    target_field: source.as.number
    ignore_missing: true
- rename:
    field: source.as.organization_name
    target_field: source.as.organization.name
    ignore_missing: true
- rename:
    field: destination.as.asn
    target_field: destination.as.number
    ignore_missing: true
- rename:
    field: destination.as.organization_name
    target_field: destination.as.organization.name
    ignore_missing: true

on_failure:
- set:
    field: error.message
    value: '{{ _ingest.on_failure_message }}'
- remove:
    ignore_missing: true
    field:
      - _csv
      - _unmapped_csv
