---
description: Pipeline for parsing Symantec Endpoint logs
processors:
# TODO: Replace script with a set processor that uses copy_from.
#- set:
#    copy_from: message
#    field: event.original
- script:
    description: set event.original
    lang: painless
    source: |
      def event = ctx.event;
      if (event == null) {
          event = [:];
          ctx['event'] = event;
      }
      event['original'] = ctx.message;
- dissect:
    if: ctx?.message.contains("KAFKA_CONNECT_SYSLOG")
    field: message
    pattern: '%{} - - - - %{message}'
- set:
    field: event.ingested
    value: '{{_ingest.timestamp}}'
- set:
    # TODO: See if timestamps can be configured with timezone.
    field: event.timezone
    value: '-05:00'
- set:
    field: observer.vendor
    value: Symantec
- set:
    field: observer.product
    value: Endpoint Protection
- set:
    field: observer.type
    value: edr
- set:
    field: event.module
    value: symantec
- set:
    field: event.dataset
    value: symantec.endpoint
- grok:
    field: message
    patterns:
      - '<%{NONNEGINT:log.syslog.facility.code:long}>%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:observer.name} %{GREEDYDATA:message}'
- date:
    field: timestamp
    target_field: "@timestamp"
    formats:
      - "MMM  d HH:mm:ss"
      - "MMM dd HH:mm:ss"
    timezone: '{{event.timezone}}'
- remove:
    field:
      - timestamp
# https://knowledge.broadcom.com/external/article/155205/external-logging-settings-and-log-event.html
- csv:
    field: message
    target_fields:
      - _csv.server
      - _csv.event_description
      - _csv.local_ip
      - _csv.local_mac
      - _csv.remote_name
      - _csv.remote_ip
      - _csv.remote_mac
      - _csv.network_direction
      - _csv.network_transport
      - _csv.intrusion_id
      - _csv.event_start
      - _csv.event_end
      - _csv.event_count
      - _csv.process_exe
      - _csv.location
      - _csv.user_name
      - _csv.user_domain
      - _csv.local_port
      - _csv.remote_port
      - _csv.signature_id
      - _csv.signature_name
      - _csv.signature_sub_id
      - _csv.intrusion_url
      - _csv.intrusion_payload_url
      - _csv.sha256
      - _csv.md5
- script:
    description: split each csv value
    lang: painless
    source: |
      def out = [:];
      ctx._csv.forEach((k, v) -> {
          def idx = v.indexOf(":");
          if (idx != -1 && idx+1 <= v.length()) {
              def trimmed = v.substring(v.indexOf(":")+1, v.length()).trim();
              if (!trimmed.isEmpty()) {
                  out[k] = trimmed;
              }
          } else {
              out[k] = v;
          }
          return true;
      });
      ctx._csv = out;
- set:
    field: event.code
    value: '{{_csv.signature_id}}'
    ignore_empty_value: true
- rename:
    field: _csv.server
    target_field: symantec.endpoint.server
    ignore_missing: true
- remove:
    field: message
    ignore_missing: true
- rename:
    field: _csv.event_description
    target_field: message
    ignore_missing: true
- rename:
    if: ctx?._csv?.local_ip != "0.0.0.0"
    field: _csv.local_ip
    target_field: source.ip
    ignore_missing: true
- rename:
    if: ctx?._csv?.local_mac != "000000000000"
    field: _csv.local_mac
    target_field: source.mac
    ignore_missing: true
- rename:
    if: ctx?._csv?.remote_name != ""
    field: _csv.remote_name
    target_field: destination.domain
    ignore_missing: true
- rename:
    if: ctx?._csv?.remote_ip != "0.0.0.0"
    field: _csv.remote_ip
    target_field: destination.ip
    ignore_missing: true
- rename:
    if: ctx?._csv?.remote_mac != "000000000000"
    field: _csv.remote_mac
    target_field: destination.mac
    ignore_missing: true
- set:
    if: ctx?._csv?.network_direction == "Inbound"
    field: network.direction
    value: ingress
- set:
    if: ctx?._csv?.network_direction == "Outbound"
    field: network.direction
    value: egress
- rename:
    field: _csv.network_transport
    target_field: network.transport
    ignore_missing: true
- lowercase:
    field: network.transport
    ignore_missing: true
- rename:
    field: _csv.intrusion_id
    target_field: rule.id
    ignore_missing: true
- date:
    field: _csv.event_start
    target_field: event.start
    ignore_failure: true
    formats:
      - yyyy-MM-dd HH:mm:ss
    timezone: '{{event.timezone}}'
- date:
    field: _csv.event_end
    target_field: event.end
    ignore_failure: true
    formats:
      - yyyy-MM-dd HH:mm:ss
    timezone: '{{event.timezone}}'
- convert:
    field: _csv.event_count
    target_field: event.count
    type: long
    ignore_failure: true
- rename:
    field: _csv.process_exe
    target_field: process.executable
    ignore_missing: true
- rename:
    field: _csv.location
    target_field: source.geo.name
    ignore_missing: true
- rename:
    field: _csv.user_name
    target_field: user.name
    ignore_missing: true
- rename:
    field: _csv.user_domain
    target_field: user.domain
    ignore_missing: true
- convert:
    if: ctx?._csv?.local_port != "0"
    field: _csv.local_port
    target_field: source.port
    type: long
    ignore_failure: true
- convert:
    if: ctx?._csv?.remote_port != "0"
    field: _csv.remote_port
    target_field: destination.port
    type: long
    ignore_failure: true
- rename:
    field: _csv.signature_id
    target_field: symantec.endpoint.signature.id
    ignore_missing: true
- rename:
    field: _csv.signature_name
    target_field: symantec.endpoint.signature.name
    ignore_missing: true
- rename:
    field: _csv.signature_sub_id
    target_field: symantec.endpoint.signature.sub_id
    ignore_missing: true
- rename:
    field: _csv.intrusion_url
    target_field: url.original
    ignore_missing: true
- rename:
    field: _csv.intrusion_payload_url
    target_field: symantec.endpoint.intrusion_payload_url
    ignore_missing: true
- rename:
    field: _csv.sha256
    target_field: process.hash.sha256
    ignore_missing: true
- rename:
    field: _csv.md5
    target_field: process.hash.md5
    ignore_missing: true
- script:
    # Local was assumed to be source and remote was assumed to be destination.
    # But if direction is ingress then swap the two around.
    if: ctx?.network?.direction == "ingress" && ctx?.source != null && ctx?.destination != null
    lang: painless
    source: |
      def tmp = ctx.source;
      ctx.source = ctx.destination;
      ctx.destination = tmp;

- script:
    description: apply ecs categories
    lang: painless
    ignore_failure: true
    source: |
      ctx.event.kind = 'event';
      ctx.event.category = ['intrusion_detection'];
      if (ctx.message.contains('not blocked')) {
          ctx.event.type = ['allowed'];
          ctx.event.action = 'detected';
      } else if (!ctx.message.contains('not blocked') && ctx.message.contains('blocked')) {
          ctx.event.type = ['denied'];
          ctx.event.action = 'blocked';
      } else {
          ctx.event.type = ['info'];
      }

- remove:
    field:
      - _csv

# IP Geolocation Lookup
- geoip:
    if: ctx.source?.geo == null
    field: source.ip
    target_field: source.geo
    ignore_missing: true
- geoip:
    if: ctx.destination?.geo == null
    field: destination.ip
    target_field: destination.geo
    ignore_missing: true

# IP Autonomous System (AS) Lookup
- geoip:
    database_file: GeoLite2-ASN.mmdb
    field: source.ip
    target_field: source.as
    properties:
      - asn
      - organization_name
    ignore_missing: true
- geoip:
    database_file: GeoLite2-ASN.mmdb
    field: destination.ip
    target_field: destination.as
    properties:
      - asn
      - organization_name
    ignore_missing: true
- rename:
    field: source.as.asn
    target_field: source.as.number
    ignore_missing: true
- rename:
    field: source.as.organization_name
    target_field: source.as.organization.name
    ignore_missing: true
- rename:
    field: destination.as.asn
    target_field: destination.as.number
    ignore_missing: true
- rename:
    field: destination.as.organization_name
    target_field: destination.as.organization.name
    ignore_missing: true


on_failure:
- set:
    field: error.message
    value: '{{ _ingest.on_failure_message }}'
- remove:
    field: _csv
    ignore_missing: true
