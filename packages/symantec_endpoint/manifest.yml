name: symantec_endpoint
title: Symantec Endpoint Protection
version: 0.0.1
release: experimental
description: Collect logs from Symantec Endpoint Protection with Elastic Agent.
type: integration
format_version: 1.0.0
license: basic
categories: ["security"]
conditions:
  kibana.version: "^7.15.0"
icons:
  - src: /img/logo.svg
    title: Symantec
    size: 216x216
    type: image/svg+xml
policy_templates:
  - name: symantec
    title: Symantec logs
    description: Collect logs from Symantec instances
    inputs:
      - type: logfile
        title: "Collect Symantec logs (input: logfile)"
        description: "Collecting logs from Symantec instances (input: logfile)"
      - type: tcp
        title: "Collect Symantec logs (input: tcp)"
        description: "Collecting logs from Symantec instances (input: tcp)"
      - type: udp
        title: "Collect Symantec logs (input: udp)"
        description: "Collecting logs from Symantec instances (input: udp)"
owner:
  github: elastic/security-external-integrations
